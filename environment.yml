name: opencv-handtracking
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # Optional but commonly useful (lets you sanity-check the env)
  - ipython
  - pip:
      # MediaPipe Tasks API used by handtracking.py
      - mediapipe>=0.10.0
      # OpenCV bindings (cv2)
      - opencv-python>=4.8
      - numpy
      - scipy
